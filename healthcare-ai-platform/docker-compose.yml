version: "3.9"

services:
  # ─── FastAPI Backend ───────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: healthcare-ai-platform:latest
    container_name: healthcare_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # Mount data and models so they persist across container restarts
      - ./data:/app/data
      - ./models:/app/models
      - ./exports:/app/exports
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    networks:
      - healthcare_net

  # ─── Streamlit Frontend ────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    image: healthcare-ai-platform:latest
    container_name: healthcare_frontend
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - API_BASE_URL=http://api:8000
    volumes:
      - ./data:/app/data
      - ./exports:/app/exports
    command: >
      streamlit run frontend/app.py
      --server.port=8501
      --server.address=0.0.0.0
      --server.headless=true
      --browser.gatherUsageStats=false
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - healthcare_net

networks:
  healthcare_net:
    driver: bridge
