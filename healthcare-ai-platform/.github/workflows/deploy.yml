name: Build and Deploy to Azure

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  ACR_NAME: healthcareairegistry
  IMAGE_NAME: healthcare-ai
  WEBAPP_NAME: healthcare-ai-sprint

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify no venv or large files
        run: |
          echo "Repository size check:"
          du -sh .
          echo "Checking no venv folder:"
          [ ! -d "venv" ] && echo "OK - no venv" || echo "WARNING - venv found"

      - name: Set up Python for tests
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install test dependencies
        run: |
          pip install pytest httpx fastapi
          pip install torch==2.2.0+cpu \
            --extra-index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt
        continue-on-error: true

      - name: Run tests
        run: pytest tests/ -v --tb=short
        env:
          APP_ENV: test
          MODEL_PATH: models/model.pkl
          LABEL_ENCODER_PATH: models/label_encoder.pkl
        continue-on-error: true

      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to Azure Container Registry
        run: |
          az acr login --name ${{ env.ACR_NAME }}

      - name: Build Docker image
        run: |
          docker build -t ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }} .
          docker tag ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }} \
                     ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest

      - name: Push to Azure Container Registry
        run: |
          docker push ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.WEBAPP_NAME }}
          images: ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest

      - name: Verify deployment
        run: |
          sleep 30
          curl -f https://${{ env.WEBAPP_NAME }}.azurewebsites.net/health \
            && echo "Deployment successful!" \
            || echo "Health check failed - check Azure logs"
